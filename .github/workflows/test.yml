name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check go.mod/go.sum are tidy
        run: go mod tidy -diff

      # There are no test files yet, so the build is what actually gates here --
      # it catches a stale go.sum before a tag rather than during a release run.
      - run: go build ./...

      - run: go test ./...
